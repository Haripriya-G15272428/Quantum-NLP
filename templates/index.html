<!DOCTYPE html>
<html>
<head>
    <title>Quantum Legal NLP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }
        .card {
            border-radius: 15px;
        }
        textarea {
            resize: none;
        }
        #output {
            background: #111827;
            color: #22c55e;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- 🔥 HEADER WITH LOGOUT -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>⚖️ Quantum Legal Text Classifier</h1>
            <p class="text-secondary mb-0">AI + Quantum Simulation Analysis</p>
        </div>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <!-- INPUT CARD -->
    <div class="card p-4 shadow-lg bg-dark">

        <label class="form-label">Enter Legal Text</label>
        <textarea id="text" class="form-control mb-3" rows="5"
        placeholder="Paste legal document or case text..."></textarea>

        <button onclick="analyze()" class="btn btn-primary w-100">
            🔍 Analyze
        </button>

    </div>

    <!-- OUTPUT -->
    <div class="mt-4">
        <h4>📊 Output</h4>
        <pre id="output">Waiting for analysis...</pre>
    </div>

</div>

<script>
async function analyze() {
    let text = document.getElementById("text").value;

    if (!text) {
        alert("Please enter text");
        return;
    }

    document.getElementById("output").innerHTML = `
        <div class="spinner-border text-light"></div>
        <p>Analyzing...</p>
    `;

    try {
        let response = await fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text: text })
        });

        let data = await response.json();

        let result = "Top Tokens:\n";
        data.tokens.forEach(t => {
            result += t[0] + " : " + t[1].toFixed(4) + "\n";
        });

        result += "\nQuantum Score:\n";
        result += JSON.stringify(data.quantum, null, 2);

        document.getElementById("output").innerText = result;

    } catch (error) {
        document.getElementById("output").innerText =
            "❌ Error: " + error;
    }
}
</script>

</body>
</html>
